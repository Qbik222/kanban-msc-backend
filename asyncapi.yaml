asyncapi: 2.6.0
id: urn:kanban:backend:realtime
info:
  title: Kanban Backend Realtime API
  version: 1.0.0
  description: |
    AsyncAPI specification for Socket.IO board events.
    For quick usage and Swagger overview, see documentation.md.
defaultContentType: application/json
servers:
  local:
    url: localhost:3000
    protocol: socket.io
    description: Local NestJS backend
channels:
  joinBoard:
    description: Client subscribes to updates for a specific board room.
    publish:
      summary: Join board room
      operationId: joinBoard
      message:
        $ref: '#/components/messages/JoinBoardMessage'
  boardJoined:
    description: Server confirms client joined the board room.
    subscribe:
      summary: Board joined event
      operationId: onBoardJoined
      message:
        $ref: '#/components/messages/BoardJoinedMessage'
  boardUpdated:
    description: Server event emitted after successful board rename (PATCH /boards/:id).
    subscribe:
      summary: Board updated event
      operationId: onBoardUpdated
      message:
        $ref: '#/components/messages/BoardUpdatedMessage'
  boardDeleted:
    description: Server event emitted after successful soft delete (DELETE /boards/:id).
    subscribe:
      summary: Board deleted event
      operationId: onBoardDeleted
      message:
        $ref: '#/components/messages/BoardDeletedMessage'
  columnsUpdated:
    description: Server event emitted after column create, update, reorder, or delete. Payload contains only active columns (isDeleted false); after delete the removed column is not in the array.
    subscribe:
      summary: Columns updated event
      operationId: onColumnsUpdated
      message:
        $ref: '#/components/messages/ColumnsUpdatedMessage'
components:
  messages:
    JoinBoardMessage:
      name: joinBoard
      title: Join board room
      payload:
        $ref: '#/components/schemas/BoardIdPayload'
    BoardJoinedMessage:
      name: board:joined
      title: Board joined
      payload:
        $ref: '#/components/schemas/BoardIdPayload'
    BoardUpdatedMessage:
      name: board:updated
      title: Board updated
      payload:
        $ref: '#/components/schemas/BoardResponsePayload'
    BoardDeletedMessage:
      name: board:deleted
      title: Board deleted
      payload:
        $ref: '#/components/schemas/BoardResponsePayload'
    ColumnsUpdatedMessage:
      name: columns:updated
      title: Columns updated
      payload:
        $ref: '#/components/schemas/ColumnsUpdatedPayload'
  schemas:
    BoardResponsePayload:
      type: object
      description: Full board data sent on board:updated / board:deleted.
      required:
        - id
        - title
        - ownerId
        - isDeleted
      properties:
        id:
          type: string
          description: MongoDB ObjectId of the board.
        title:
          type: string
          description: Board title.
        ownerId:
          type: string
          description: Owner user ID.
        isDeleted:
          type: boolean
          description: For board:deleted this is true.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BoardIdPayload:
      type: object
      additionalProperties: false
      required:
        - boardId
      properties:
        boardId:
          type: string
          description: MongoDB ObjectId of the board.
          examples:
            - 65f0b3c3f2b7f6a1e9b1a001
    ColumnsUpdatedPayload:
      type: object
      required:
        - boardId
        - columns
      properties:
        boardId:
          type: string
          description: Board ID.
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnResponsePayload'
    ColumnResponsePayload:
      type: object
      description: Active column (isDeleted false). After delete, removed column is not in the array.
      required:
        - id
        - title
        - order
        - boardId
        - isDeleted
      properties:
        id:
          type: string
        title:
          type: string
        order:
          type: number
        boardId:
          type: string
        isDeleted:
          type: boolean
        cards:
          type: array
          items:
            $ref: '#/components/schemas/CardResponsePayload'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CardResponsePayload:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        order:
          type: number
        columnId:
          type: string
