asyncapi: 2.6.0
id: urn:kanban:backend:realtime
info:
  title: Kanban Backend Realtime API
  version: 1.0.0
  description: |
    AsyncAPI specification for Socket.IO board events.
    For quick usage and Swagger overview, see documentation.md.
defaultContentType: application/json
servers:
  local:
    url: localhost:3000
    protocol: socket.io
    description: Local NestJS backend
channels:
  joinBoard:
    description: Client subscribes to updates for a specific board room.
    publish:
      summary: Join board room
      operationId: joinBoard
      message:
        $ref: '#/components/messages/JoinBoardMessage'
  boardJoined:
    description: Server confirms client joined the board room.
    subscribe:
      summary: Board joined event
      operationId: onBoardJoined
      message:
        $ref: '#/components/messages/BoardJoinedMessage'
  boardUpdated:
    description: Server event emitted after successful board rename (PATCH /boards/:id).
    subscribe:
      summary: Board updated event
      operationId: onBoardUpdated
      message:
        $ref: '#/components/messages/BoardUpdatedMessage'
  boardDeleted:
    description: Server event emitted after successful soft delete (DELETE /boards/:id).
    subscribe:
      summary: Board deleted event
      operationId: onBoardDeleted
      message:
        $ref: '#/components/messages/BoardDeletedMessage'
  columnsUpdated:
    description: Server event emitted after column create, update, reorder, or delete. Payload contains only active columns (isDeleted false); after delete the removed column is not in the array.
    subscribe:
      summary: Columns updated event
      operationId: onColumnsUpdated
      message:
        $ref: '#/components/messages/ColumnsUpdatedMessage'
  cardCreated:
    description: Server event emitted after successful card creation (POST /cards).
    subscribe:
      summary: Card created event
      operationId: onCardCreated
      message:
        $ref: '#/components/messages/CardCreatedMessage'
  cardUpdated:
    description: Server event emitted after successful card update (PATCH /cards/:id).
    subscribe:
      summary: Card updated event
      operationId: onCardUpdated
      message:
        $ref: '#/components/messages/CardUpdatedMessage'
  cardMoved:
    description: Server event emitted after successful card move/reorder (PATCH /cards/:id/move).
    subscribe:
      summary: Card moved event (full snapshot)
      operationId: onCardMoved
      message:
        $ref: '#/components/messages/CardMovedMessage'
  commentAdded:
    description: Server event emitted after successful card comment creation (POST /cards/:id/comments).
    subscribe:
      summary: Comment added event
      operationId: onCommentAdded
      message:
        $ref: '#/components/messages/CommentAddedMessage'
components:
  messages:
    JoinBoardMessage:
      name: joinBoard
      title: Join board room
      payload:
        $ref: '#/components/schemas/BoardIdPayload'
    BoardJoinedMessage:
      name: board:joined
      title: Board joined
      payload:
        $ref: '#/components/schemas/BoardIdPayload'
    BoardUpdatedMessage:
      name: board:updated
      title: Board updated
      payload:
        $ref: '#/components/schemas/BoardResponsePayload'
    BoardDeletedMessage:
      name: board:deleted
      title: Board deleted
      payload:
        $ref: '#/components/schemas/BoardResponsePayload'
    ColumnsUpdatedMessage:
      name: columns:updated
      title: Columns updated
      payload:
        $ref: '#/components/schemas/ColumnsUpdatedPayload'
    CardCreatedMessage:
      name: card_created
      title: Card created
      payload:
        $ref: '#/components/schemas/CardResponsePayload'
    CardUpdatedMessage:
      name: card_updated
      title: Card updated
      payload:
        $ref: '#/components/schemas/CardResponsePayload'
    CardMovedMessage:
      name: card_moved
      title: Card moved
      payload:
        $ref: '#/components/schemas/BoardDetailsResponsePayload'
    CommentAddedMessage:
      name: comment_added
      title: Comment added
      payload:
        $ref: '#/components/schemas/CardResponsePayload'
  schemas:
    BoardResponsePayload:
      type: object
      description: Full board data sent on board:updated / board:deleted.
      required:
        - id
        - title
        - ownerId
        - projectIds
        - isDeleted
      properties:
        id:
          type: string
          description: MongoDB ObjectId of the board.
        title:
          type: string
          description: Board title.
        ownerId:
          type: string
          description: Owner user ID.
        projectIds:
          type: array
          items:
            type: string
          description: ids-only tags/projects attached to this board.
        isDeleted:
          type: boolean
          description: For board:deleted this is true.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BoardIdPayload:
      type: object
      additionalProperties: false
      required:
        - boardId
      properties:
        boardId:
          type: string
          description: MongoDB ObjectId of the board.
          examples:
            - 65f0b3c3f2b7f6a1e9b1a001
    ColumnsUpdatedPayload:
      type: object
      required:
        - boardId
        - columns
      properties:
        boardId:
          type: string
          description: Board ID.
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnResponsePayload'
    ColumnResponsePayload:
      type: object
      description: Active column (isDeleted false). After delete, removed column is not in the array.
      required:
        - id
        - title
        - order
        - boardId
        - isDeleted
      properties:
        id:
          type: string
        title:
          type: string
        order:
          type: number
        boardId:
          type: string
        isDeleted:
          type: boolean
        cards:
          type: array
          items:
            $ref: '#/components/schemas/CardResponsePayload'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BoardDetailsResponsePayload:
      type: object
      allOf:
        - $ref: '#/components/schemas/BoardResponsePayload'
        - type: object
          required:
            - columns
          properties:
            columns:
              type: array
              items:
                $ref: '#/components/schemas/ColumnResponsePayload'
    DeadlinePayload:
      type: object
      required: []
      properties:
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
    CardCommentPayload:
      type: object
      required:
        - _id
        - text
        - authorId
      properties:
        _id:
          type: string
        text:
          type: string
        authorId:
          type: string
        createdAt:
          type: string
          format: date-time
    CardResponsePayload:
      type: object
      description: Full card data.
      required:
        - id
        - title
        - description
        - order
        - columnId
        - boardId
        - isDeleted
        - projectIds
        - priority
        - comments
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        order:
          type: number
        columnId:
          type: string
        boardId:
          type: string
        isDeleted:
          type: boolean
        assigneeId:
          type: string
        deadline:
          $ref: '#/components/schemas/DeadlinePayload'
        projectIds:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [low, medium, high]
        comments:
          type: array
          items:
            $ref: '#/components/schemas/CardCommentPayload'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
